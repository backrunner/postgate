name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for example, 0.2.0 or 0.2.0-beta.1)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  NODE_VERSION: 22.13.0

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
      channel: ${{ steps.version.outputs.channel }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANNEL: ${{ inputs.channel }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
              echo "Manual releases must run from the main branch" >&2
              exit 1
            fi
            version="${INPUT_VERSION#v}"
            channel="${INPUT_CHANNEL}"
          else
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" == *-* ]]; then
              channel="beta"
            else
              channel="stable"
            fi
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: $version" >&2
            exit 1
          fi

          if [[ "$channel" == "stable" && "$version" == *-* ]]; then
            echo "Stable releases cannot use a prerelease version: $version" >&2
            exit 1
          fi

          if [[ "$channel" == "beta" && ! "$version" =~ -beta([.]|$) ]]; then
            echo "Beta releases must use a -beta prerelease version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Validate updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is not configured" >&2
            exit 1
          fi

      - name: Validate macOS signing and notarization configuration
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        shell: bash
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_TEAM_ID APPLE_PROVISIONING_PROFILE; do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          api_key_count=0
          password_count=0
          for name in APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            [[ -z "${!name}" ]] || ((api_key_count += 1))
          done
          for name in APPLE_ID APPLE_PASSWORD; do
            [[ -z "${!name}" ]] || ((password_count += 1))
          done

          if (( api_key_count == 3 )); then
            echo "Using App Store Connect API key notarization"
          elif (( password_count == 2 )); then
            echo "Using Apple ID notarization"
          else
            (( api_key_count == 0 )) || echo "APPLE_API_KEY, APPLE_API_ISSUER, and APPLE_API_KEY_BASE64 must be configured together" >&2
            (( password_count == 0 )) || echo "APPLE_ID and APPLE_PASSWORD must be configured together" >&2
            echo "Configure either App Store Connect API key credentials or Apple ID credentials for notarization" >&2
            exit 1
          fi

      - name: Create or reuse draft release
        id: release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANNEL: ${{ steps.version.outputs.channel }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.find((release) => release.tag_name === tag);

            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
                sha: context.sha,
                force: true,
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            if (existing && !existing.draft) {
              core.setFailed(`${tag} is already published`);
              return;
            }

            let release;
            if (existing) {
              release = (await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id,
                target_commitish: context.sha,
                name: `PostGate ${tag}`,
                prerelease: process.env.CHANNEL === 'beta',
              })).data;
            } else {
              release = (await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: `PostGate ${tag}`,
                draft: true,
                prerelease: process.env.CHANNEL === 'beta',
                generate_release_notes: true,
              })).data;
            }

            core.setOutput('release_id', String(release.id));

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin
            bundles: app,dmg
            target: aarch64-apple-darwin
            architecture: arm64
            dmg_architecture: aarch64
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            bundles: app,dmg
            target: x86_64-apple-darwin
            architecture: x86_64
            dmg_architecture: x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate native runner architecture
        shell: bash
        run: |
          actual="$(uname -m)"
          expected="${{ matrix.architecture }}"
          [[ "$actual" == "$expected" ]] || {
            echo "Expected a native $expected runner, got $actual" >&2
            exit 1
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/set-release-version.mjs "${{ needs.create-release.outputs.version }}"

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ env.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Prepare CloudKit provisioning profile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          if [[ -z "$APPLE_PROVISIONING_PROFILE" ]]; then
            echo "APPLE_PROVISIONING_PROFILE is required for signed CloudKit builds" >&2
            exit 1
          fi
          node -e 'require("node:fs").writeFileSync("apps/desktop/src-tauri/embedded.provisionprofile", Buffer.from(process.env.APPLE_PROVISIONING_PROFILE, "base64"))'
          profile_plist="$RUNNER_TEMP/postgate-provisioning-profile.plist"
          security cms -D -i apps/desktop/src-tauri/embedded.provisionprofile > "$profile_plist"
          application_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$profile_plist" 2>/dev/null || /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")"
          team_id="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")"
          containers="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-container-identifiers' "$profile_plist")"
          services="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-services' "$profile_plist")"
          environment="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.icloud-container-environment' "$profile_plist")"
          expiration="$(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' "$profile_plist")"
          expiration_epoch="$(node -e 'const value = Date.parse(process.argv[1]); if (!Number.isFinite(value)) process.exit(1); console.log(Math.floor(value / 1000))' "$expiration")"
          get_task_allow="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$profile_plist" 2>/dev/null || true)"
          [[ "$team_id" == "$APPLE_TEAM_ID" ]] || { echo "Provisioning profile TeamIdentifier does not match APPLE_TEAM_ID" >&2; exit 1; }
          [[ "$application_id" == "$APPLE_TEAM_ID.com.alkinum.postgate" ]] || { echo "Provisioning profile App ID must be $APPLE_TEAM_ID.com.alkinum.postgate" >&2; exit 1; }
          grep -Eq '^[[:space:]]*iCloud\.com\.alkinum\.postgate[[:space:]]*$' <<<"$containers" || { echo "Provisioning profile is missing iCloud.com.alkinum.postgate" >&2; exit 1; }
          grep -Eq '^[[:space:]]*(CloudKit|\*)[[:space:]]*$' <<<"$services" || { echo "Provisioning profile does not enable CloudKit" >&2; exit 1; }
          [[ "$environment" == Production ]] || { echo "Provisioning profile must use the Production CloudKit environment" >&2; exit 1; }
          [[ "$expiration_epoch" -gt "$(date '+%s')" ]] || { echo "Provisioning profile has expired" >&2; exit 1; }
          [[ "$get_task_allow" != true ]] || { echo "Production provisioning profile must not allow debugging" >&2; exit 1; }

      - name: Prepare App Store Connect API key
        if: env.APPLE_API_KEY != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        shell: bash
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          node -e 'require("node:fs").writeFileSync(process.argv[1], Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"))' "$key_path"
          grep -q 'BEGIN PRIVATE KEY' "$key_path" || { echo "APPLE_API_KEY_BASE64 is not a valid base64-encoded .p8 key" >&2; exit 1; }
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build and upload release assets (signed app)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }} --config src-tauri/tauri.cloudkit.production.conf.json --bundles ${{ matrix.bundles }} --features quic
          retryAttempts: 3

      - name: Validate signed and notarized app bundle
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          app="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/PostGate.app"
          test -d "$app"
          profile="$app/Contents/embedded.provisionprofile"
          test -f "$profile" || { echo "Final app is missing embedded.provisionprofile" >&2; exit 1; }
          cmp -s apps/desktop/src-tauri/embedded.provisionprofile "$profile" || { echo "Final app contains an unexpected provisioning profile" >&2; exit 1; }
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Contents/Info.plist")"
          [[ "$bundle_id" == com.alkinum.postgate ]] || { echo "Final app has unexpected bundle ID: $bundle_id" >&2; exit 1; }
          signed_team="$(codesign -dv --verbose=4 "$app" 2>&1 | sed -n 's/^TeamIdentifier=//p')"
          [[ "$signed_team" == "$APPLE_TEAM_ID" ]] || { echo "Final app signature TeamIdentifier does not match APPLE_TEAM_ID" >&2; exit 1; }

          expected_arch="${{ matrix.architecture }}"
          for binary in postgate postgate-mcp-stdio; do
            executable="$app/Contents/MacOS/$binary"
            test -x "$executable" || { echo "Final app is missing executable: $binary" >&2; exit 1; }
            actual_arch="$(lipo -archs "$executable")"
            [[ "$actual_arch" == "$expected_arch" ]] || {
              echo "$binary must contain only $expected_arch, got: $actual_arch" >&2
              exit 1
            }
          done

          entitlements="$RUNNER_TEMP/postgate-final-entitlements.plist"
          rm -f "$entitlements"
          codesign -d --entitlements "$entitlements" --xml "$app" >/dev/null
          test -s "$entitlements" || { echo "Final app signature has no entitlements" >&2; exit 1; }
          plutil -lint "$entitlements"
          containers="$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.icloud-container-identifiers' "$entitlements")"
          services="$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.icloud-services' "$entitlements")"
          environment="$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.icloud-container-environment' "$entitlements")"
          grep -Eq '^[[:space:]]*iCloud\.com\.alkinum\.postgate[[:space:]]*$' <<<"$containers" || { echo "Final app entitlement is missing iCloud.com.alkinum.postgate" >&2; exit 1; }
          grep -Eq '^[[:space:]]*(CloudKit|\*)[[:space:]]*$' <<<"$services" || { echo "Final app entitlement does not enable CloudKit" >&2; exit 1; }
          [[ "$environment" == Production ]] || { echo "Final app entitlement must use the Production CloudKit environment" >&2; exit 1; }

          embedded_plist="$RUNNER_TEMP/postgate-embedded-profile.plist"
          security cms -D -i "$profile" > "$embedded_plist"
          embedded_team="$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$embedded_plist")"
          embedded_app_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$embedded_plist" 2>/dev/null || /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$embedded_plist")"
          [[ "$embedded_team" == "$APPLE_TEAM_ID" ]] || { echo "Embedded profile TeamIdentifier does not match APPLE_TEAM_ID" >&2; exit 1; }
          [[ "$embedded_app_id" == "$APPLE_TEAM_ID.com.alkinum.postgate" ]] || { echo "Embedded profile App ID is incorrect" >&2; exit 1; }

          codesign --verify --deep --strict --verbose=4 "$app"
          spctl --assess --type execute --verbose=4 "$app"
          xcrun stapler validate "$app"

      - name: Smoke test Apple Silicon app startup
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          app="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/PostGate.app"
          log="$RUNNER_TEMP/postgate-startup.log"
          HOME="$RUNNER_TEMP/postgate-home" RUST_BACKTRACE=1 "$app/Contents/MacOS/postgate" >"$log" 2>&1 &
          pid=$!
          sleep 8
          if ! kill -0 "$pid" 2>/dev/null; then
            cat "$log"
            wait "$pid"
          fi
          kill "$pid"
          wait "$pid" || true

      - name: Notarize and validate downloadable DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          dmg_dir="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          shopt -s nullglob
          dmgs=("$dmg_dir"/*_"${{ matrix.dmg_architecture }}".dmg)
          [[ "${#dmgs[@]}" -eq 1 ]] || {
            echo "Expected exactly one ${{ matrix.dmg_architecture }} DMG, found ${#dmgs[@]}" >&2
            exit 1
          }
          dmg="${dmgs[0]}"

          if [[ -n "$APPLE_API_KEY" ]]; then
            notary_credentials=(
              --key "$APPLE_API_KEY_PATH"
              --key-id "$APPLE_API_KEY"
              --issuer "$APPLE_API_ISSUER"
            )
          else
            notary_credentials=(
              --apple-id "$APPLE_ID"
              --password "$APPLE_PASSWORD"
              --team-id "$APPLE_TEAM_ID"
            )
          fi

          xcrun notarytool submit "$dmg" "${notary_credentials[@]}" --wait --timeout 30m
          xcrun stapler staple "$dmg"

          codesign --verify --verbose=4 "$dmg"
          hdiutil verify "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
          xcrun stapler validate "$dmg"

          mount_point="$RUNNER_TEMP/postgate-dmg-${{ matrix.architecture }}"
          mkdir -p "$mount_point"
          hdiutil attach -nobrowse -readonly -mountpoint "$mount_point" "$dmg"
          trap 'hdiutil detach "$mount_point"' EXIT

          bundled_app="$mount_point/PostGate.app"
          test -d "$bundled_app" || { echo "DMG is missing PostGate.app" >&2; exit 1; }
          codesign --verify --deep --strict --verbose=4 "$bundled_app"
          spctl --assess --type execute --verbose=4 "$bundled_app"

          expected_arch="${{ matrix.architecture }}"
          for binary in postgate postgate-mcp-stdio; do
            actual_arch="$(lipo -archs "$bundled_app/Contents/MacOS/$binary")"
            [[ "$actual_arch" == "$expected_arch" ]] || {
              echo "DMG $binary must contain only $expected_arch, got: $actual_arch" >&2
              exit 1
            }
          done

          hdiutil detach "$mount_point"
          trap - EXIT

          gh release upload "v${{ needs.create-release.outputs.version }}" "$dmg" --clobber

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]

    steps:
      - name: Validate updater manifest and publish
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          VERSION: ${{ needs.create-release.outputs.version }}
          CHANNEL: ${{ needs.create-release.outputs.channel }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            });
            const requiredDmgs = [
              ['Apple Silicon', /(?:aarch64|arm64).*\.dmg$/i],
              ['Intel', /(?:x64|x86_64).*\.dmg$/i],
            ];
            const missingDmgs = requiredDmgs
              .filter(([, pattern]) => !assets.some((asset) => pattern.test(asset.name)))
              .map(([architecture]) => architecture);
            if (missingDmgs.length > 0) {
              core.setFailed(`Missing downloadable DMG assets: ${missingDmgs.join(', ')}`);
              return;
            }

            const updaterAsset = assets.find((asset) => asset.name === 'latest.json');
            if (!updaterAsset) {
              core.setFailed('latest.json was not uploaded');
              return;
            }

            const response = await github.request(
              'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: updaterAsset.id,
                headers: { accept: 'application/octet-stream' },
              },
            );
            const manifest = JSON.parse(Buffer.from(response.data).toString('utf8'));
            const assetsById = new Map(
              assets.map((asset) => [String(asset.id), asset]),
            );
            const downloadBase = [
              'https://github.com',
              context.repo.owner,
              context.repo.repo,
              'releases/download',
              `v${process.env.VERSION}`,
            ].join('/');

            for (const [platform, entry] of Object.entries(manifest.platforms ?? {})) {
              const assetId = entry.url?.match(/\/releases\/assets\/(\d+)(?:[?#].*)?$/)?.[1];
              if (!assetId) continue;

              const asset = assetsById.get(assetId);
              if (!asset) {
                core.setFailed(`Updater platform ${platform} references unknown asset ${assetId}`);
                return;
              }
              entry.url = `${downloadBase}/${encodeURIComponent(asset.name)}`;
            }

            const requiredPlatforms = [
              'darwin-aarch64',
              'darwin-x86_64',
            ];
            const missing = requiredPlatforms.filter((platform) => {
              const entry = manifest.platforms?.[platform];
              return !entry?.url?.startsWith(`${downloadBase}/`) || !entry?.signature;
            });

            if (manifest.version !== process.env.VERSION || missing.length > 0) {
              core.setFailed(
                `Invalid latest.json: version=${manifest.version}, missing=${missing.join(', ') || 'none'}`,
              );
              return;
            }

            const manifestData = Buffer.from(JSON.stringify(manifest, null, 2) + '\n');
            await github.rest.repos.deleteReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: updaterAsset.id,
            });
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: manifestData,
              headers: {
                'content-type': 'application/json',
                'content-length': manifestData.length,
              },
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
              prerelease: process.env.CHANNEL === 'beta',
              make_latest: process.env.CHANNEL === 'beta' ? 'false' : 'true',
            });

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            let betaFeed = releases.find((release) => release.tag_name === 'beta');
            if (!betaFeed) {
              betaFeed = (await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: 'beta',
                target_commitish: context.sha,
                name: 'PostGate Beta Channel',
                body: 'Rolling update manifest for PostGate Beta clients.',
                draft: false,
                prerelease: true,
                make_latest: 'false',
              })).data;
            } else {
              betaFeed = (await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: betaFeed.id,
                name: 'PostGate Beta Channel',
                body: 'Rolling update manifest for PostGate Beta clients.',
                draft: false,
                prerelease: true,
                make_latest: 'false',
              })).data;
            }

            const betaAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: betaFeed.id,
              per_page: 100,
            });
            const currentManifestAsset = betaAssets.find((asset) => asset.name === 'latest.json');

            const parseSemver = (value) => {
              const [withoutBuild] = value.split('+');
              const separator = withoutBuild.indexOf('-');
              const core = (separator === -1 ? withoutBuild : withoutBuild.slice(0, separator))
                .split('.')
                .map(Number);
              const prerelease = separator === -1
                ? null
                : withoutBuild.slice(separator + 1).split('.');
              return { core, prerelease };
            };
            const compareSemver = (left, right) => {
              const a = parseSemver(left);
              const b = parseSemver(right);
              for (let index = 0; index < 3; index += 1) {
                if (a.core[index] !== b.core[index]) return a.core[index] - b.core[index];
              }
              if (a.prerelease === null) return b.prerelease === null ? 0 : 1;
              if (b.prerelease === null) return -1;
              const length = Math.max(a.prerelease.length, b.prerelease.length);
              for (let index = 0; index < length; index += 1) {
                const aPart = a.prerelease[index];
                const bPart = b.prerelease[index];
                if (aPart === undefined) return -1;
                if (bPart === undefined) return 1;
                if (aPart === bPart) continue;
                const aNumeric = /^[0-9]+$/.test(aPart);
                const bNumeric = /^[0-9]+$/.test(bPart);
                if (aNumeric && bNumeric) return Number(aPart) - Number(bPart);
                if (aNumeric !== bNumeric) return aNumeric ? -1 : 1;
                return aPart.localeCompare(bPart);
              }
              return 0;
            };

            if (currentManifestAsset) {
              const currentResponse = await github.request(
                'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: currentManifestAsset.id,
                  headers: { accept: 'application/octet-stream' },
                },
              );
              const currentManifest = JSON.parse(
                Buffer.from(currentResponse.data).toString('utf8'),
              );
              if (compareSemver(manifest.version, currentManifest.version) < 0) {
                core.info(
                  `Keeping newer beta feed ${currentManifest.version}; published ${manifest.version}`,
                );
                return;
              }
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: currentManifestAsset.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: betaFeed.id,
              name: 'latest.json',
              data: manifestData,
              headers: {
                'content-type': 'application/json',
                'content-length': manifestData.length,
              },
            });
