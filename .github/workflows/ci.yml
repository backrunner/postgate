name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 11.10.0

jobs:
  check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter @postgate/desktop lint

      - name: Typecheck frontend
        run: pnpm --filter @postgate/desktop typecheck

      - name: Build frontend
        run: pnpm --filter @postgate/desktop build

      - name: Check Rust
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-features -- -D warnings

      - name: Test Rust
        working-directory: apps/desktop/src-tauri
        run: cargo test

      - name: Test Rust with QUIC
        working-directory: apps/desktop/src-tauri
        run: cargo test --features quic
